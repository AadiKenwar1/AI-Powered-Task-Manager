spring.application.name=task-manager

# ── H2 In-Memory Database ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ── H2 Web Console (http://localhost:8080/h2-console) ─────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── OpenAI ────────────────────────────────────────────────────────────────────
# Key resolution: OPEN_AI_KEY first (take-home convention), then OPENAI_API_KEY; task-manager/.env loaded in main().
# Never commit a real key — keep secrets in .env (gitignored) or your shell environment.
openai.api.key=${OPEN_AI_KEY:${OPENAI_API_KEY:}}
openai.api.url=https://api.openai.com/v1
openai.api.model=${OPENAI_MODEL:gpt-4o-mini}
